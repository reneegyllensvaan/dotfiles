# Mako config — Wayland notification daemon, replaces dunst.

sort=+time
max-visible=5

background-color=#1e2127
text-color=#abb2bf
border-color=#5c6370
border-radius=0

width=450
height=70
margin=10,30,10,10
padding=8

default-timeout=10000

[urgency=high]
border-color=#e06c75

[urgency=low]
border-color=#5c6370
